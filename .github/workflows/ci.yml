name: ci
on:
  push:
    branches: [main]
  pull_request:
jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: emr
          POSTGRES_PASSWORD: emr
          POSTGRES_DB: emr
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U emr -d emr"
          --health-interval 2s --health-timeout 2s --health-retries 30
    env:
      TEST_DATABASE_URL: postgres://emr:emr@localhost:5432/emr
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
      - run: go vet ./...
      # -p 1: integration tests share one database; package-parallel
      # runs would reset each other's schema mid-test.
      - run: go test -p 1 -count=1 ./...
      - run: go build ./...
  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker build -t nz-open-emr:ci .
